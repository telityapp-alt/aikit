# Cloudflare Pages config. Secrets are NOT stored here — set them via
# `.dev.vars` (local) and the Pages dashboard (Settings → Environment variables)
# in production: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ANTHROPIC_API_KEY,
# SCRAPECREATORS_API_KEY, XENDIT_SECRET_KEY.

name = "aikit"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"
